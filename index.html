<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VidDownloader - Unduh Video Gratis</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col justify-between antialiased">

  <!-- Main Content Container -->
  <main class="flex-grow flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 rounded-2xl p-6 shadow-xl space-y-6">
      
      <!-- Header / Logo -->
      <div class="text-center space-y-2">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-teal-500/10 text-teal-400 mb-2">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
          </svg>
        </div>
        <h1 class="text-2xl font-bold tracking-tight bg-gradient-to-r from-teal-400 to-emerald-400 bg-clip-text text-transparent">
          VidDownloader
        </h1>
        <p class="text-xs text-zinc-400">
          Unduh video YouTube & TikTok tanpa aplikasi dan tanpa ribet
        </p>
      </div>

      <!-- Input Form -->
      <div class="space-y-3">
        <div class="relative">
          <input 
            type="text" 
            id="videoUrl" 
            placeholder="Tempel link YouTube atau TikTok di sini..." 
            class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-sm text-zinc-200 placeholder-zinc-500 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition-all"
          >
        </div>
        <button 
          onclick="getDownloadLink()" 
          class="w-full bg-teal-500 hover:bg-teal-600 active:scale-[0.98] text-zinc-950 font-semibold py-3 px-4 rounded-xl text-sm transition-all shadow-lg shadow-teal-500/10 cursor-pointer"
        >
          Proses Video
        </button>
      </div>

      <!-- Status & Result Area -->
      <div id="resultStatus" class="hidden text-center text-sm text-zinc-400 animate-pulse py-2">
        Sedang memproses video, tunggu sebentar...
      </div>

      <div id="resultCard" class="hidden bg-zinc-950 border border-zinc-800 rounded-xl p-4 space-y-3">
        <div class="flex items-start space-x-3">
          <div class="p-2 bg-zinc-900 border border-zinc-800 rounded-lg text-teal-400" id="resultIcon">
            <!-- Icon diisi via JS -->
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-xs font-semibold uppercase tracking-wider text-teal-400" id="resultSource">Sumber</p>
            <p class="text-sm font-medium text-zinc-200 truncate" id="resultTitle">Judul Video</p>
          </div>
        </div>
        
        <a 
          href="#" 
          id="downloadBtn"
          target="_blank" 
          rel="noopener noreferrer"
          class="flex items-center justify-center space-x-2 w-full bg-zinc-800 hover:bg-zinc-750 text-zinc-200 text-sm font-medium py-2.5 px-4 rounded-lg transition-colors border border-zinc-700"
        >
          <span>Unduh Sekarang (.mp4)</span>
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 0 0 3 8.25v10.5A2.25 2.25 0 0 0 5.25 21h10.5A2.25 2.25 0 0 0 18 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25" />
          </svg>
        </a>
      </div>

      <!-- Error Message Box -->
      <div id="errorBox" class="hidden bg-red-500/10 border border-red-500/20 text-red-400 text-sm rounded-xl p-3 text-center">
        Terjadi kesalahan. Silakan periksa kembali link Anda.
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="text-center py-6 text-xs text-zinc-600 border-t border-zinc-900">
    &copy; 2026 VidDownloader. Dibuat dengan HP via GitHub & Netlify.
  </footer>

  <!-- Logic Script -->
  <script>
    async function getDownloadLink() {
      const url = document.getElementById('videoUrl').value.trim();
      const statusDiv = document.getElementById('resultStatus');
      const cardDiv = document.getElementById('resultCard');
      const errorBox = document.getElementById('errorBox');
      
      // Reset Tampilan
      statusDiv.classList.add('hidden');
      cardDiv.classList.add('hidden');
      errorBox.classList.add('hidden');

      if (!url) {
        showError("Silakan tempel link video terlebih dahulu.");
        return;
      }

      statusDiv.classList.remove('hidden');

      try {
        const response = await fetch('/.netlify/functions/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        
        const data = await response.json();
        statusDiv.classList.add('hidden');

        if (response.ok && data.downloadUrl) {
          // Isi data ke Card
          document.getElementById('resultSource').innerText = data.source;
          document.getElementById('resultTitle').innerText = data.title;
          
          const downloadBtn = document.getElementById('downloadBtn');
          downloadBtn.href = data.downloadUrl;
          
          // Kustomisasi Icon berdasarkan platform
          const iconSvg = data.source === 'YouTube' 
            ? '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5 text-red-500"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>'
            : '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5 text-zinc-100"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.02 1.63 4.19 1.22 1.25 2.89 1.95 4.6 2.05v3.63c-1.57-.16-3.1-.79-4.33-1.8-.18-.15-.35-.32-.51-.49v5.9c.02 2.39-1.01 4.71-2.82 6.27A7.72 7.72 0 0 1 6.13 19.3c-2.02-1.74-2.91-4.48-2.28-7.07.61-2.73 2.88-4.88 5.64-5.28v3.74c-1.12.26-2.04 1.13-2.27 2.26-.35 1.55.51 3.16 2.02 3.63 1.48.5 3.2-.23 3.72-1.69.17-.5.23-1.03.22-1.56V0h-.66z"/></svg>';
          
          document.getElementById('resultIcon').innerHTML = iconSvg;
          
          // Tampilkan Card Hasil
          cardDiv.classList.remove('hidden');
        } else {
          showError(data.error || "Gagal memproses video tersebut.");
        }
      } catch (err) {
        statusDiv.classList.add('hidden');
        showError("Terjadi gangguan koneksi ke serverless.");
      }
    }

    function showError(msg) {
      const errorBox = document.getElementById('errorBox');
      errorBox.innerText = msg;
      errorBox.classList.remove('hidden');
    }
  </script>
</body>
</html>
